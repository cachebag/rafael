name: payme web CI

on:
  push:
    branches: [master]
    paths:
      - "services/payme/frontend/**"
      - ".github/workflows/payme-web-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/payme/frontend/**"
      - ".github/workflows/payme-web-ci.yml"

jobs:
  payme-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/payme/frontend/package-lock.json

      - run: npm ci
        working-directory: services/payme/frontend

      - run: npm run lint
        working-directory: services/payme/frontend

      - run: npm run build
        working-directory: services/payme/frontend
