name: payme web CI

on:
  push:
    branches: [master]
    paths:
      - "services/payme/frontend/**"
      - ".github/workflows/payme-web-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/payme/frontend/**"
      - ".github/workflows/payme-web-ci.yml"

jobs:
  payme-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: install bun
        run: |
          set -euo pipefail
          BUN_VERSION=1.3.11
          BUN_BIN="$HOME/.bun/bin/bun"
          if [ ! -x "$BUN_BIN" ] || [ "$("$BUN_BIN" --version)" != "$BUN_VERSION" ]; then
            mkdir -p "$HOME/.bun/bin" "$RUNNER_TEMP/bun"
            curl -fsSL -o "$RUNNER_TEMP/bun/bun.zip" "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
            python3 -m zipfile -e "$RUNNER_TEMP/bun/bun.zip" "$RUNNER_TEMP/bun"
            cp "$RUNNER_TEMP/bun/bun-linux-x64/bun" "$BUN_BIN"
            chmod +x "$BUN_BIN"
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - run: bun install --frozen-lockfile
        working-directory: services/payme/frontend

      - run: bun run lint
        working-directory: services/payme/frontend

      - run: bun run build
        working-directory: services/payme/frontend
