name: payme web CI

on:
  push:
    branches: [master]
    paths:
      - "services/payme/frontend/**"
      - ".github/workflows/payme-web-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/payme/frontend/**"
      - ".github/workflows/payme-web-ci.yml"

jobs:
  payme-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile
        working-directory: services/payme/frontend

      - run: bun run lint
        working-directory: services/payme/frontend

      - run: bun run build
        working-directory: services/payme/frontend
