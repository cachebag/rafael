name: deploy chat

on:
  push:
    branches: [master]
    paths:
      - "services/chat/**"
      - "crates/client/**"
      - "crates/common/**"
      - "crates/config/**"
      - "crates/tool-registry/**"
      - "crates/tools/web/**"
      - "infra/systemd/rafael-chat.service"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch:

concurrency:
  group: deploy-rafael
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: install bun
        run: |
          set -euo pipefail
          BUN_VERSION=1.3.11
          BUN_BIN="$HOME/.bun/bin/bun"
          if [ ! -x "$BUN_BIN" ] || [ "$("$BUN_BIN" --version)" != "$BUN_VERSION" ]; then
            mkdir -p "$HOME/.bun/bin" "$RUNNER_TEMP/bun"
            curl -fsSL -o "$RUNNER_TEMP/bun/bun.zip" "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
            python3 -m zipfile -e "$RUNNER_TEMP/bun/bun.zip" "$RUNNER_TEMP/bun"
            cp "$RUNNER_TEMP/bun/bun-linux-x64/bun" "$BUN_BIN"
            chmod +x "$BUN_BIN"
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: deploy chat on rafael
        run: |
          set -euo pipefail
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
          export NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt

          REPO="$HOME/rafael"
          cd "$REPO"

          git fetch origin master
          git reset --hard origin/master

          cd services/chat/web
          bun install --frozen-lockfile
          bun run build

          cd "$REPO"
          cargo build --release -p chat

          systemctl --user restart rafael-chat
          systemctl --user is-active rafael-chat

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3031/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "chat service did not become ready on port 3031"
          journalctl --user -u rafael-chat -n 20 --no-pager
          exit 1
